name: wcap

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: main
    paths-ignore:
      - '**/README.md'

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Build (x64)
        shell: cmd
        run: cd repo && build.cmd x64

      - name: Build (arm64)
        shell: cmd
        run: cd repo && build.cmd arm64

      - name: Create GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "repo/wcap-x64.exe" `
            "repo/wcap-arm64.exe" `
            --repo "${{ github.repository }}" `
            --title "wcap ${{ github.ref_name }}" `
            --generate-notes `
            --latest
