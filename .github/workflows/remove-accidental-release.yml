name: 清除誤建的發行版

on:
  push:
    paths:
      - .github/workflows/remove-accidental-release.yml

permissions:
  contents: write

jobs:
  remove-release:
    runs-on: ubuntu-latest
    steps:
      - name: 刪除 v1.0.0 Release 與標籤
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete v1.0.0 --repo "${{ github.repository }}" --cleanup-tag --yes
